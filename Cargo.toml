[package]
name = "lodestone"
version = "0.1.0"
edition = "2024"

[dependencies]
winit = "0.30"
wgpu = "29.0.0"
egui = "0.33"
egui-wgpu = "0.33"
egui-winit = "0.33"
glyphon = "0.10"
cosmic-text = "0.18"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
toml = "0.9.8"
dirs = "6.0"
log = "0.4"
env_logger = "0.11"
rand = "0.10.0"
pollster = "0.4"
bytemuck = { version = "1", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
